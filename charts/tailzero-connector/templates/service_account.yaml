apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tailzero-connector.generatedServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailzero-connector.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
