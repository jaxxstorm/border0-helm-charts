{{/* Always render the secret so Helm tracks it across all release revisions.
     Helm's 3-way merge preserves the "data" field written by the connector at
     runtime because neither the old nor the new manifest specifies "data", so
     live changes to that field are left untouched during upgrades. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tailzero-connector.generatedSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tailzero-connector.labels" . | nindent 4 }}
type: Opaque
